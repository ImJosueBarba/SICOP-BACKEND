[pytest]
# Configuración de pytest para SICOP Backend

# Patrones de archivos de test
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directorio de tests
testpaths = tests

# Opciones por defecto
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    
# Markers personalizados
markers =
    unit: Tests unitarios
    integration: Tests de integración
    slow: Tests lentos (> 1 segundo)
    ml: Tests del módulo ML
    api: Tests de endpoints API

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
