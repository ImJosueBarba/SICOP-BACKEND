# ============================================================================
# Configuración del Sistema de Machine Learning
# Planta de Tratamiento de Agua "La Esperanza"
# ============================================================================

# Información del Proyecto
project:
  name: "SICOP ML - Optimización Consumo Químicos"
  version: "1.0.0"
  description: "Sistema predictivo para optimización de consumo de químicos"
  
# Configuración de Datos
data:
  # Mínimo de registros históricos requeridos para entrenamiento
  min_training_samples: 90  # ~3 meses de datos diarios
  
  # Rango de fechas válidas para análisis
  date_validation:
    min_year: 2020
    max_future_days: 7  # Máximo días hacia el futuro para predicción
  
  # División de datos
  train_test_split:
    test_size: 0.20
    validation_size: 0.15
    random_state: 42
    shuffle: true
    stratify_by_month: true  # Mantener distribución mensual
  
  # Ventana temporal para features
  time_windows:
    rolling_mean_days: [3, 7, 14]
    lag_days: [1, 7, 14, 30]

# Features Engineering
features:
  # Variables de entrada (features)
  input_variables:
    - turbedad_ac
    - turbedad_at
    - ph_ac
    - ph_at
    - temperatura_ac
    - temperatura_at
    - conductividad_ac
    - conductividad_at
    - tds_ac
    - tds_at
    - caudal_total
    - presion_total
    - cloro_residual
    
  # Variables objetivo (targets)
  target_variables:
    - sulfato_consumo_kg
    - cal_consumo_kg
    - hipoclorito_consumo_kg
    - cloro_gas_consumo_kg
  
  # Features derivadas
  derived_features:
    - turbedad_ratio  # AC/AT
    - ph_delta  # AC - AT
    - temperatura_delta
    - conductividad_ratio
    - eficiencia_tratamiento
  
  # Transformaciones
  transformations:
    scaling:
      method: "standard"  # standard, minmax, robust
      save_scaler: true
    
    outlier_handling:
      method: "iqr"  # iqr, zscore, isolation_forest
      threshold: 3.0
    
    missing_values:
      strategy: "interpolate"  # mean, median, interpolate, forward_fill

# Configuración de Modelos
models:
  # Modelos a entrenar y comparar
  algorithms:
    random_forest:
      enabled: true
      params:
        n_estimators: 100
        max_depth: 15
        min_samples_split: 5
        min_samples_leaf: 2
        random_state: 42
        n_jobs: -1
      
    xgboost:
      enabled: true
      params:
        n_estimators: 100
        max_depth: 6
        learning_rate: 0.1
        subsample: 0.8
        colsample_bytree: 0.8
        random_state: 42
        n_jobs: -1
      
    lightgbm:
      enabled: true
      params:
        n_estimators: 100
        max_depth: 6
        learning_rate: 0.1
        num_leaves: 31
        random_state: 42
        n_jobs: -1
  
  # Validación cruzada
  cross_validation:
    enabled: true
    n_splits: 5
    method: "kfold"  # kfold, stratified_kfold, time_series_split
  
  # Selección del mejor modelo
  selection_criteria:
    primary_metric: "rmse"  # rmse, mae, r2
    minimize: true  # true para rmse/mae, false para r2

# Métricas de Evaluación
evaluation:
  metrics:
    - mae      # Mean Absolute Error
    - rmse     # Root Mean Squared Error
    - r2       # R² Score
    - mape     # Mean Absolute Percentage Error
  
  # Umbrales de aceptación
  thresholds:
    min_r2_score: 0.70
    max_mape_percent: 15.0
  
  # Reportes
  generate_reports:
    feature_importance: true
    residual_analysis: true
    prediction_intervals: true

# Detección de Anomalías
anomaly_detection:
  enabled: true
  
  model:
    algorithm: "isolation_forest"  # isolation_forest, lof, one_class_svm
    contamination: 0.05  # % esperado de anomalías
    
  thresholds:
    turbedad_ac:
      min: 0
      max: 100
      critical_max: 150
    
    ph_ac:
      min: 6.0
      max: 9.0
      critical_min: 5.5
      critical_max: 9.5
    
    cloro_residual:
      min: 0.2
      max: 2.0
      critical_min: 0.1
      critical_max: 3.0
  
  alert_levels:
    - name: "normal"
      score_range: [-0.1, 1.0]
      color: "green"
    
    - name: "sospechoso"
      score_range: [-0.3, -0.1]
      color: "yellow"
    
    - name: "critico"
      score_range: [-1.0, -0.3]
      color: "red"

# Persistencia de Modelos
persistence:
  # Directorio para modelos entrenados
  models_dir: "ml/trained_models"
  
  # Versionado de modelos
  versioning:
    enabled: true
    format: "YYYYMMDD_HHMMSS"
    keep_last_n_versions: 5
  
  # Formato de serialización
  serialization:
    format: "joblib"  # joblib, pickle
    compress: 3  # 0-9, mayor = más compresión
  
  # Metadata
  save_metadata:
    training_date: true
    metrics: true
    feature_names: true
    hyperparameters: true
    data_statistics: true

# Inferencia (Predicción en Producción)
inference:
  # Cache de predicciones
  cache:
    enabled: false
    ttl_seconds: 300
  
  # Validación de inputs
  input_validation:
    strict_mode: true
    allow_null_values: false
  
  # Intervalos de confianza
  confidence_intervals:
    enabled: true
    confidence_level: 0.95
  
  # Logging de predicciones
  logging:
    enabled: true
    log_all_predictions: false
    log_anomalies_only: false

# Optimización y Performance
optimization:
  # Re-entrenamiento automático
  auto_retrain:
    enabled: false
    schedule: "monthly"  # daily, weekly, monthly
    min_new_samples: 30
  
  # Monitoreo de drift
  model_drift:
    enabled: true
    check_frequency: "weekly"
    alert_threshold: 0.15  # 15% degradación en métricas

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Archivos de log
  files:
    training: "logs/ml_training.log"
    inference: "logs/ml_inference.log"
    errors: "logs/ml_errors.log"

# Paths
paths:
  base_dir: "ml"
  data_dir: "ml/data"
  models_dir: "ml/trained_models"
  logs_dir: "logs"
  notebooks_dir: "ml/notebooks"
  reports_dir: "ml/reports"
